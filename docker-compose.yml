services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: second_brain
    ports:
      - "5432:5432"

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: demo
      POSTGRES_PWD: demo
      POSTGRES_SEEDS: postgres
    depends_on:
      - postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.31.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    ports:
      - "8233:8080"

  app:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
      - temporal
    ports:
      - "3017:3017"
